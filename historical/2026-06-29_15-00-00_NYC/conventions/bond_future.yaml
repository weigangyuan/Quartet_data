cbot_zt_future:
  instrument_style: standard
  future_type: bond_future
  currency: USD
  index_name: TREASURY
  exchange: CBOT
  clearing_house: CME
  timezone: America/Chicago
  calendar: cbot
  root: ZT
  name: 2-Year U.S. Treasury Note Future
  face_amount: 200000
  point_value: 2000
  price_quote_style: points_and_32nds
  futures_tick_points: 0.00390625
  futures_tick_value: 7.8125
  delivery_month_cycle: [H, M, U, Z]
  last_trade_rule_id: cbot_treasury_future_last_trade
  delivery_rule_id: cbot_treasury_physical_delivery
  delivery_grade_rule_id: cbot_2y_tnote_basket
  delivery_grade_summary: >
    U.S. Treasury notes with original term to maturity not more than 5 years
    3 months and remaining term to maturity of at least 1 year 9 months but
    not more than 2 years from the first day of the delivery month.
  rulebook_chapter: "21"
  rulebook_url: https://www.cmegroup.com/rulebook/CBOT/II/21.pdf

